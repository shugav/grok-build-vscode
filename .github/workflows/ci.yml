name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run package

      - name: Update releases/ with built VSIX
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p releases
          cp "grok-vscode-${VERSION}.vsix" "releases/grok-vscode-${VERSION}.vsix"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "releases/grok-vscode-${VERSION}.vsix"
          git diff --cached --quiet || git commit -m "ci: update releases/grok-vscode-${VERSION}.vsix [skip ci]"
          git push
